                    $ref: "#/components/schemas/OnboardingProfile"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Profile already exists for this merchant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/internal/onboarding/{id}:
    get:
      summary: Get onboarding profile
      description: Returns a single onboarding profile by ID.
      x-platform:
        kind: resource
        entity: OnboardingProfile
        affectsLedger: false
      operationId: getOnboardingProfile
      tags:
        - Onboarding
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Onboarding profile found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OnboardingProfile"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Profile not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update onboarding profile
      description: >
        Updates fields on an onboarding profile. Supports state transitions via the status field, validated against the
        onboarding state machine.
      x-platform:
        kind: transition
        entity: OnboardingProfile
        stateChanges:
          - STARTED -> SUBMITTED
          - SUBMITTED -> UNDER_REVIEW
          - UNDER_REVIEW -> APPROVED | DENIED
        emitsEvents:
          - onboarding.profile.updated
          - onboarding.profile.submitted
          - onboarding.profile.approved
          - onboarding.profile.denied
        affectsLedger: false
      operationId: updateOnboardingProfile
      tags:
        - Onboarding
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                business_name:
                  type: string
                business_type:
                  type: string
                tax_id:
                  type: string
                website:
                  type: string
                  format: uri
                country:
                  type: string
                  minLength: 2
                  maxLength: 2
                status:
                  type: string
                  enum:
                    - STARTED
                    - SUBMITTED
                    - UNDER_REVIEW
                    - APPROVED
                    - DENIED
                    - WITHDRAWN
                metadata:
                  type: object
      responses:
        "200":
          description: Profile updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OnboardingProfile"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Profile not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid state transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete onboarding profile
      description: Deletes a non-terminal onboarding profile and all nested resources.
      x-platform:
        kind: transition
        entity: OnboardingProfile
        emitsEvents:
          - onboarding.profile.deleted
        affectsLedger: false
        stateChanges:
          - active -> deleted
      operationId: deleteOnboardingProfile
      tags:
        - Onboarding
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Profile deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      deleted:
                        type: boolean
        "400":
          description: Cannot delete terminal-state profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Profile not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
