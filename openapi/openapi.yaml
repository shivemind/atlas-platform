          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create onboarding profile
      description: |
        Creates a new onboarding profile for a merchant. Each merchant may have at most one profile.
      x-platform:
        kind: resource
        entity: OnboardingProfile
        emitsEvents:
          - onboarding.profile.created
        affectsLedger: false
        workflowRefs:
          - onboarding_full
      operationId: createOnboardingProfile
      tags:
        - Onboarding
      security:
        - PlatformAdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - merchant_id
              properties:
                merchant_id:
                  type: string
                business_name:
                  type: string
                business_type:
                  type: string
                tax_id:
                  type: string
                website:
                  type: string
                  format: uri
                country:
                  type: string
                  minLength: 2
                  maxLength: 2
                metadata:
                  type: object
            examples:
              basic:
                value:
                  merchant_id: cmf1merchant123
                  business_name: Acme Corp
                  business_type: llc
                  country: US
      responses:
        "201":
          description: Onboarding profile created.
