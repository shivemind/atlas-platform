components:
  securitySchemes:
    MerchantKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer API key for merchant-scoped operations. Pass as `Authorization: Bearer {{merchantApiKey}}`.
    PlatformAdminKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer API key for platform admin operations. Pass as `Authorization: Bearer {{platformAdminKey}}`.
  schemas:
    ErrorResponse:
      description: Standard error response envelope returned for 4xx/5xx responses.
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Human-readable error description.
    PaginationMeta:
      description: Pagination metadata included in list responses.
      type: object
      required:
        - page
        - pageSize
        - total
        - hasMore
      properties:
        page:
          type: integer
          description: Current page number (1-indexed).
        pageSize:
          type: integer
          description: Number of results per page.
        total:
          type: integer
          description: Total number of matching records.
        hasMore:
          type: boolean
          description: Whether additional pages exist.
    CreditNote:
      description: A credit note issued against an invoice.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        invoice_id:
          type: string
        number:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - issued
            - void
        reason:
          type: string
          nullable: true
        amount:
          type: integer
        currency:
          type: string
        voided_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreditNoteLineItem:
      description: A line item on a credit note.
      type: object
      properties:
        id:
          type: string
        credit_note_id:
          type: string
        description:
          type: string
        quantity:
          type: integer
        unit_amount:
          type: integer
        amount:
          type: integer
        created_at:
          type: string
          format: date-time
    Event:
      description: A domain event representing a state change in the system.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        type:
          type: string
          description: Event type (e.g. payment_intent.succeeded).
        entity_type:
          type: string
          description: Type of entity that triggered the event.
        entity_id:
          type: string
          description: ID of the entity that triggered the event.
        payload:
          type: object
          description: Event payload with entity snapshot.
        actor_type:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    WebhookEndpoint:
      description: A registered webhook endpoint for receiving event notifications.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        url:
          type: string
          format: uri
        is_active:
          type: boolean
        enabled_events:
          type: array
          items:
            type: string
        secret:
          type: string
          description: Only included on creation and rotate.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WebhookDelivery:
      description: A webhook delivery record with attempt history.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        webhook_endpoint_id:
          type: string
        event_type:
          type: string
        payload:
          type: object
        status:
          type: string
          enum:
            - PENDING
            - DELIVERED
            - FAILED
        delivered_at:
          type: string
          format: date-time
          nullable: true
        next_attempt_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attempts:
          type: array
          items:
            type: object
            properties:
              attempt_number:
                type: integer
              response_status:
                type: integer
                nullable: true
              created_at:
                type: string
                format: date-time
              completed_at:
                type: string
                format: date-time
                nullable: true
    Adjustment:
      description: A credit or debit adjustment.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
