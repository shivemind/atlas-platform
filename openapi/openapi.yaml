openapi: 3.1.0
info:
  title: Atlas Platform API
  version: 0.2.0
  description: Platform operations — orgs, onboarding, webhooks, events, reports, exports, and cron jobs
  contact:
    name: AtlasPayments Team
    url: https://github.com/shivemind/atlaspayments
servers:
  - url: http://localhost:3000
    description: Local development server. Override via Postman {{baseUrl}} environment variable.
tags:
  - name: Orgs
    description: Organization and workspace management
  - name: Teams
    description: Team membership and role management
  - name: Onboarding
    description: Merchant onboarding and KYB simulator
  - name: Underwriting
    description: Underwriting cases and decisions
  - name: Reports
    description: On-demand report generation
  - name: Exports
    description: Export management and scheduled exports
  - name: Webhooks
    description: Webhook endpoint CRUD, deliveries, and replay
  - name: Events
    description: Event stream queries with cursor pagination
  - name: Cron
    description: Internal cron-triggered processors (Vercel Cron compatible)
paths:
  /api/v1/webhook_endpoints:
    get:
      summary: List webhook endpoints
      description: Returns all webhook endpoints for the authenticated merchant.
      x-platform:
        kind: resource
        entity: WebhookEndpoint
        affectsLedger: false
      operationId: listWebhookEndpoints
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      responses:
        "200":
          description: Webhook endpoints for the merchant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
              examples:
                list:
                  value:
                    data:
                      - id: cmf1webhook123
                        url: https://example.com/webhooks
                        enabled_events:
                          - payment_intent.succeeded
                        created_at: 2026-03-01T09:00:00.000Z
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create webhook endpoint
      description: |
        Registers a new webhook endpoint. Generates a HMAC SHA-256 signing secret shown only on creation.
      x-platform:
        kind: resource
        entity: WebhookEndpoint
        affectsLedger: false
      operationId: createWebhookEndpoint
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - enabled_events
              properties:
                url:
                  type: string
                  format: uri
                enabled_events:
                  type: array
                  items:
                    type: string
            examples:
              basic:
                value:
                  url: https://example.com/webhooks
                  enabled_events:
                    - payment_intent.succeeded
                    - refund.succeeded
      responses:
        "201":
          description: Webhook endpoint created with signing secret.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_endpoint:
                    type: object
              examples:
                created:
                  value:
                    webhook_endpoint:
                      id: cmf1webhook123
                      url: https://example.com/webhooks
                      enabled_events:
                        - payment_intent.succeeded
                        - refund.succeeded
                      secret: whsec_abc123def456
                      created_at: 2026-03-01T09:00:00.000Z
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_endpoints/{id}/rotate_secret:
    post:
      summary: Rotate webhook endpoint signing secret
      description: |
        Generates a new HMAC signing secret; the previous secret is immediately invalidated.
      x-platform:
        kind: transition
        entity: WebhookEndpoint
        stateChanges:
          - secret_rotated
        affectsLedger: false
      operationId: rotateWebhookEndpointSecret
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: New signing secret generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
              examples:
                rotated:
                  value:
                    secret: whsec_newxyz789
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_endpoints/{id}:
    get:
      summary: Retrieve a webhook endpoint
      description: Returns the webhook endpoint with its secret and configuration.
      x-platform:
        kind: resource
        entity: WebhookEndpoint
        affectsLedger: false
      operationId: getWebhookEndpoint
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Webhook endpoint details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_endpoint:
                    $ref: "#/components/schemas/WebhookEndpoint"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update a webhook endpoint
      description: |
        Update the URL, enabled events, or active status of a webhook endpoint.
      x-platform:
        kind: transition
        entity: WebhookEndpoint
        stateChanges:
          - updated
        affectsLedger: false
      operationId: updateWebhookEndpoint
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                enabled_events:
                  type: array
                  items:
                    type: string
                is_active:
                  type: boolean
            examples:
              updateUrl:
                value:
                  url: https://example.com/new-webhook
              deactivate:
                value:
                  is_active: false
      responses:
        "200":
          description: Webhook endpoint updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_endpoint:
                    $ref: "#/components/schemas/WebhookEndpoint"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Deactivate a webhook endpoint
      description: |
        Soft-deletes a webhook endpoint by setting is_active to false. The endpoint is retained for audit history.
      x-platform:
        kind: transition
        entity: WebhookEndpoint
        stateChanges:
          - deactivated
        affectsLedger: false
      operationId: deleteWebhookEndpoint
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Webhook endpoint deactivated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_endpoint:
                    $ref: "#/components/schemas/WebhookEndpoint"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_endpoints/{id}/test:
    post:
      summary: Send a test webhook delivery
      description: >
        Creates a test webhook delivery with event type "endpoint.test" and immediately dispatches it to the endpoint
        URL. Useful for verifying endpoint connectivity and signature validation.
      x-platform:
        kind: transition
        entity: WebhookDelivery
        stateChanges:
          - test_sent
        affectsLedger: false
      operationId: testWebhookEndpoint
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "201":
          description: Test delivery created and dispatched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_delivery:
                    $ref: "#/components/schemas/WebhookDelivery"
                  delivered:
                    type: boolean
                  response_status:
                    type: integer
              examples:
                delivered:
                  value:
                    webhook_delivery:
                      id: cmf1testdel123
                      event_type: endpoint.test
                      status: DELIVERED
                    delivered: true
                    response_status: 200
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_deliveries:
    get:
      summary: List webhook deliveries
      description: |
        Returns a paginated list of webhook deliveries with optional status, event type, and date range filters.
      x-platform:
        kind: resource
        entity: WebhookDelivery
        affectsLedger: false
      operationId: listWebhookDeliveries
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: status
          description: Filter by delivery status.
          schema:
            type: string
            enum:
              - PENDING
              - DELIVERED
              - FAILED
        - in: query
          name: event_type
          description: Filter by event type string.
          schema:
            type: string
        - in: query
          name: from
          description: Filter deliveries on or after this timestamp.
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          description: Filter deliveries before this timestamp.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated webhook deliveries with attempt history.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
              examples:
                filtered:
                  value:
                    data:
                      - id: cmf1delivery123
                        event_type: payment_intent.succeeded
                        status: DELIVERED
                        delivered_at: 2026-03-01T10:00:00.000Z
                        attempts:
                          - attempt_number: 1
                            response_status: 200
                    pagination:
                      page: 1
                      pageSize: 10
                      total: 1
                      hasMore: false
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_deliveries/{id}:
    get:
      summary: Retrieve a webhook delivery
      description: Returns a single webhook delivery with its full attempt history.
      x-platform:
        kind: resource
        entity: WebhookDelivery
        affectsLedger: false
      operationId: getWebhookDelivery
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Webhook delivery with attempts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_delivery:
                    $ref: "#/components/schemas/WebhookDelivery"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook delivery not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_deliveries/resend:
    post:
      summary: Resend failed webhook deliveries
      description: >
        Finds all FAILED deliveries in the given time range and re-dispatches them. Limited to 100 deliveries per
        request.
      x-platform:
        kind: transition
        entity: WebhookDelivery
        stateChanges:
          - resent
        affectsLedger: false
      operationId: resendWebhookDeliveries
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - to
              properties:
                from:
                  type: string
                  format: date-time
                  description: Start of time range (inclusive).
                to:
                  type: string
                  format: date-time
                  description: End of time range (inclusive).
            examples:
              lastHour:
                value:
                  from: 2026-03-01T09:00:00.000Z
                  to: 2026-03-01T10:00:00.000Z
      responses:
        "200":
          description: Resend results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resent:
                    type: integer
                  delivered:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        delivery_id:
                          type: string
                        delivered:
                          type: boolean
                        response_status:
                          type: integer
              examples:
                resendResult:
                  value:
                    resent: 5
                    delivered: 3
                    failed: 2
                    results:
                      - delivery_id: cmf1del001
                        delivered: true
                        response_status: 200
        "400":
          description: Invalid payload or time range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/webhook_deliveries/{id}/replay:
    post:
      summary: Replay a webhook delivery
      description: Creates a new delivery attempt for an existing webhook delivery.
      x-platform:
        kind: transition
        entity: WebhookDelivery
        stateChanges:
          - replayed
        emitsEvents:
          - webhook.delivery.replayed
        affectsLedger: false
      operationId: replayWebhookDelivery
      tags:
        - Webhooks
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Replay attempt created; result returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery_id:
                    type: string
                  attempt_number:
                    type: integer
                  delivered:
                    type: boolean
                  response_status:
                    type: integer
                    nullable: true
              examples:
                replayed:
                  value:
                    delivery_id: cmf1delivery123
                    attempt_number: 2
                    delivered: true
                    response_status: 200
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook delivery not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/events:
    get:
      summary: List events
      description: >
        Returns a cursor-paginated list of events for the authenticated merchant. Supports filtering by type,
        entity_type, and entity_id. Uses cursor-based pagination with starting_after / ending_before semantics.
      x-platform:
        kind: resource
        entity: Event
        affectsLedger: false
      operationId: listEvents
      tags:
        - Events
      security:
        - MerchantKeyAuth: []
      parameters:
        - in: query
          name: type
          description: Filter by event type (e.g. payment_intent.succeeded).
          schema:
            type: string
        - in: query
          name: entity_type
          description: Filter by entity type (e.g. PaymentIntent).
          schema:
            type: string
        - in: query
          name: entity_id
          description: Filter by entity ID.
          schema:
            type: string
        - in: query
          name: starting_after
          description: Cursor for forward pagination — event ID to start after.
          schema:
            type: string
        - in: query
          name: ending_before
          description: Cursor for backward pagination — event ID to end before.
          schema:
            type: string
        - in: query
          name: limit
          description: Number of results to return (1–100, default 10).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Cursor-paginated list of events.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  has_more:
                    type: boolean
              examples:
                events:
                  value:
                    data:
                      - id: evt_abc123
                        type: payment_intent.succeeded
                        entity_type: PaymentIntent
                        entity_id: pi_xyz789
                        payload: {}
                        created_at: 2026-03-01T10:00:00.000Z
                    has_more: true
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/events/{id}:
    get:
      summary: Retrieve an event
      description: Returns a single event by ID for the authenticated merchant.
      x-platform:
        kind: resource
        entity: Event
        affectsLedger: false
      operationId: getEvent
      tags:
        - Events
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Event details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  event:
                    $ref: "#/components/schemas/Event"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/internal/cron/webhooks/retry:
    get:
      summary: Run webhook retry processor (Vercel Cron)
      description: |
        GET variant for Vercel Cron which sends GET requests. Identical behavior to the POST variant.
      x-platform:
        kind: cron
        entity: WebhookDelivery
        affectsLedger: false
      operationId: runWebhookRetryCronGet
      tags:
        - Cron
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - in: header
          name: x-cron-secret
          required: false
          description: Shared secret for cron caller authentication.
          schema:
            type: string
        - in: header
          name: x-vercel-cron
          required: false
          description: Set to "1" by Vercel Cron.
          schema:
            type: string
            example: "1"
        - in: query
          name: cron_secret
          required: false
          description: Fallback cron secret as query param.
          schema:
            type: string
      responses:
        "200":
          description: Retry queue processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  processed:
                    type: integer
                  delivered:
                    type: integer
                  failed:
                    type: integer
              examples:
                processed:
                  value:
                    status: ok
                    processed: 2
                    delivered: 1
                    failed: 1
        "202":
          description: Lock held — skipped.
          content:
            application/json:
              examples:
                locked:
                  value:
                    status: locked
        "401":
          description: Invalid cron secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Run webhook retry processor
      description: >
        Internal cron endpoint processing eligible pending webhook deliveries with exponential backoff. Protected by
        cron secret or Vercel Cron header.
      x-platform:
        kind: cron
        entity: WebhookDelivery
        affectsLedger: false
      operationId: runWebhookRetryCron
      tags:
        - Cron
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - in: header
          name: x-cron-secret
          required: false
          description: Shared secret for cron caller authentication.
          schema:
            type: string
        - in: header
          name: x-vercel-cron
          required: false
          description: Set to "1" by Vercel Cron.
          schema:
            type: string
            example: "1"
        - in: query
          name: cron_secret
          required: false
          description: Fallback cron secret as query param.
          schema:
            type: string
      responses:
        "200":
          description: Retry queue processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  processed:
                    type: integer
                  delivered:
                    type: integer
                  failed:
                    type: integer
              examples:
                processed:
                  value:
                    status: ok
                    processed: 2
                    delivered: 1
                    failed: 1
        "202":
          description: Lock held — skipped.
          content:
            application/json:
              examples:
                locked:
                  value:
                    status: locked
        "401":
          description: Invalid cron secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/internal/cron/billing/run:
    get:
      summary: Run billing cycle (Vercel Cron)
      description: >
        GET variant for Vercel Cron. Finds active subscriptions whose current period has ended, creates invoices, and
        advances subscription periods.
      x-platform:
        kind: cron
        entity: Invoice
        affectsLedger: true
      operationId: runBillingCronGet
      tags:
        - Cron
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - in: header
          name: x-cron-secret
          required: false
          description: Shared secret for cron caller authentication.
          schema:
            type: string
        - in: header
          name: x-vercel-cron
          required: false
          description: Set to "1" by Vercel Cron.
          schema:
            type: string
            example: "1"
        - in: query
          name: cron_secret
          required: false
          description: Fallback cron secret as query param.
          schema:
            type: string
      responses:
        "200":
          description: Billing run completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  processed:
                    type: integer
                  invoices_created:
                    type: integer
              examples:
                success:
                  value:
                    status: ok
                    processed: 5
                    invoices_created: 5
        "202":
          description: Lock held — skipped.
          content:
            application/json:
              examples:
                locked:
                  value:
                    status: locked
        "401":
          description: Invalid cron secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Run billing cycle
      description: >
        Internal cron endpoint that processes active subscriptions whose current period has ended. Creates invoices,
        advances subscription periods, and emits domain events. Protected by cron secret or Vercel Cron header.
      x-platform:
        kind: cron
        entity: Invoice
        affectsLedger: true
      operationId: runBillingCron
      tags:
        - Cron
      security:
        - PlatformAdminKeyAuth: []
      parameters:
        - in: header
          name: x-cron-secret
          required: false
          description: Shared secret for cron caller authentication.
          schema:
            type: string
        - in: header
          name: x-vercel-cron
          required: false
          description: Set to "1" by Vercel Cron.
          schema:
            type: string
            example: "1"
        - in: query
          name: cron_secret
          required: false
          description: Fallback cron secret as query param.
          schema:
            type: string
      responses:
        "200":
          description: Billing run completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  processed:
                    type: integer
                  invoices_created:
                    type: integer
