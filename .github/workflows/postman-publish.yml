name: Publish to Postman Cloud

on:
  push:
    branches: [main]
    paths:
      - 'postman/**'
      - 'openapi/**'
      - '.postman/**'
  workflow_dispatch:

jobs:
  publish:
    name: Sync to Postman Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Push workspace to Postman Cloud
        run: postman workspace push -y

  test:
    name: Run API Tests
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          command: 'collection run 52400725-ce6cc715-f66a-4f4b-8ecd-31877fdef6e2 -e e3b1754b-43ce-4b84-8162-32b3a3243dd8'
          api-key: ${{ secrets.POSTMAN_API_KEY }}
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Postman Cloud Sync & Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace synced via Native Git" >> $GITHUB_STEP_SUMMARY
          echo "- Collection tests executed against 52400725-ce6cc715-f66a-4f4b-8ecd-31877fdef6e2" >> $GITHUB_STEP_SUMMARY