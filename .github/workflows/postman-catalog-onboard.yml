name: Postman Catalog Onboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  collection-run:
    name: Run API Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection
        run: |
          postman collection run 52400725-e40e9ead-7bf1-4858-8a92-10c6c9ae2b9a \
            -e 52400725-bbbb93e9-1d36-4db5-81f4-3da39a9f77d9 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }} \
            || true

      - name: Trigger Monitor Run
        run: |
          curl -s -X POST "https://api.getpostman.com/monitors/1f11e3f5-4eb0-4f60-9150-cf29294b9b87/run" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" \
            || true

      - name: Summary
        if: always()
        run: |
          echo "### Postman Catalog Onboard" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: 52400725-e40e9ead-7bf1-4858-8a92-10c6c9ae2b9a" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: 52400725-bbbb93e9-1d36-4db5-81f4-3da39a9f77d9" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: [95332ec2-c81c-4224-86ea-53127f34d15f](https://go.postman.co/workspace/95332ec2-c81c-4224-86ea-53127f34d15f)" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitor**: 1f11e3f5-4eb0-4f60-9150-cf29294b9b87" >> $GITHUB_STEP_SUMMARY