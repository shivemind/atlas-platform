name: Postman Catalog Link
on:
  workflow_dispatch:

jobs:
  link-workspace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: postman-cs/postman-repo-sync-action@v0
        with:
          project-name: atlas-platform
          workspace-id: 95332ec2-c81c-4224-86ea-53127f34d15f
          generate-ci-workflow: false
          repo-write-mode: none
          environments-json: '["prod","dev"]'
          env-runtime-urls-json: '{"prod":"https://atlas-platform-two.vercel.app","dev":"http://localhost:3000"}'
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}